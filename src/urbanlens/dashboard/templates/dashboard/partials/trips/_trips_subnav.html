{% comment %}
Overview | Events | Calendar tab strip for the trips section.

Context:
  active - "overview", "list", or "calendar" (which tab is current)
{% endcomment %}
<nav class="ul-subnav-tabs" aria-label="Trips views">
    <a href="{% url 'trips.overview' %}"
       class="ul-subnav-tab {% if active == 'overview' %}is-active{% endif %}"
       {% if active == 'overview' %}aria-current="page"{% endif %}>
        <i class="material-symbols-outlined">dashboard</i>
        <span>Overview</span>
    </a>
    <a href="{% url 'trips.list' %}"
       class="ul-subnav-tab {% if active == 'list' %}is-active{% endif %}"
       {% if active == 'list' %}aria-current="page"{% endif %}>
        <i class="material-symbols-outlined">luggage</i>
        <span>Events</span>
    </a>
    <a href="{% url 'trips.calendar' %}"
       class="ul-subnav-tab {% if active == 'calendar' %}is-active{% endif %}"
       {% if active == 'calendar' %}aria-current="page"{% endif %}>
        <i class="material-symbols-outlined">calendar_month</i>
        <span>Calendar</span>
    </a>
</nav>
