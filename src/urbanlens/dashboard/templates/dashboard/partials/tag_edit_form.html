{% load dashboard_tags %}
{# Inline edit form for a single tag card (HTMX swap target) #}
<form hx-post="{% url 'tag.edit' tag.id %}"
      hx-target="#tag-rows"
      hx-swap="innerHTML"
      enctype="multipart/form-data"
      class="tag-inline-edit">
    {% csrf_token %}

    <div class="tag-form-grid">
        <div class="form-field">
            <label class="form-label">Name</label>
            <input name="name" type="text" class="form-input" value="{{ tag.name }}" required>
        </div>
        <div class="form-field">
            <label class="form-label">Order</label>
            <input name="order" type="number" class="form-input" value="{{ tag.order }}">
        </div>
    </div>

    <div class="form-field">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-input" rows="2">{{ tag.description|default:'' }}</textarea>
    </div>

    <div class="tag-icon-color-row">
        <div class="form-field">
            <label class="form-label">Icon</label>
            <div class="icon-picker-wrap">
                <div class="icon-picker" id="edit-icon-picker-{{ tag.id }}">
                    <input type="hidden" name="icon" id="edit-icon-value-{{ tag.id }}" value="{{ tag.icon|default:'' }}">
                    {% for key, label in icon_choices %}
                    <button type="button"
                            class="icon-option {% if not tag.custom_icon and tag.icon == key %}selected{% endif %}"
                            data-icon="{{ key }}" title="{{ label }}"
                            onclick="editPickStandardIcon('{{ tag.id }}', '{{ key }}', this)">
                        <i class="material-icons">{{ key }}</i>
                    </button>
                    {% endfor %}
                </div>
                <div class="icon-picker-actions">
                    <button type="button"
                            class="icon-option icon-clear {% if not tag.custom_icon and not tag.icon %}selected{% endif %}"
                            title="No icon"
                            onclick="editPickStandardIcon('{{ tag.id }}', '', this)">
                        <i class="material-icons">block</i>
                    </button>
                    <label class="icon-option icon-upload-btn {% if tag.custom_icon %}selected{% endif %}"
                           id="edit-upload-btn-{{ tag.id }}" title="Upload custom icon">
                        {% if tag.custom_icon %}
                        <img src="{{ tag.custom_icon.url }}" id="edit-custom-preview-{{ tag.id }}" class="icon-custom-thumb">
                        {% else %}
                        <i class="material-icons" id="edit-upload-glyph-{{ tag.id }}">upload</i>
                        <img id="edit-custom-preview-{{ tag.id }}" class="icon-custom-thumb" style="display:none">
                        {% endif %}
                        <input type="file" name="custom_icon" id="edit-custom-input-{{ tag.id }}" accept="image/*" style="display:none"
                               onchange="editPickCustomIcon('{{ tag.id }}', this)">
                    </label>
                </div>
            </div>
            {% if tag.custom_icon %}
            <label class="checkbox-label" style="margin-top:6px;font-size:.82rem;color:#888;">
                <input type="checkbox" name="clear_custom_icon" value="1" id="edit-clear-custom-{{ tag.id }}"> Remove custom icon
            </label>
            {% endif %}
        </div>

        <div class="form-field">
            <label class="form-label">Color</label>
            <div class="color-picker" id="edit-color-picker-{{ tag.id }}">
                <input type="hidden" name="color" id="edit-color-value-{{ tag.id }}" value="{{ tag.color|default:'' }}">
                {% for hex, label in color_choices %}
                <button type="button"
                        class="color-swatch {% if tag.color == hex %}selected{% endif %}"
                        data-color="{{ hex }}" title="{{ label }}"
                        style="background:{{ hex }};"
                        onclick="pickColor('edit-color-picker-{{ tag.id }}','edit-color-value-{{ tag.id }}','{{ hex }}',this)">
                </button>
                {% endfor %}
                <button type="button"
                        class="color-swatch color-clear {% if not tag.color %}selected{% endif %}"
                        title="No color"
                        onclick="pickColor('edit-color-picker-{{ tag.id }}','edit-color-value-{{ tag.id }}','',this)">
                    <i class="material-icons" style="font-size:1rem;">block</i>
                </button>
            </div>
        </div>
    </div>

    <div class="form-field">
        <label class="form-label">Parent tags</label>
        <div class="tag-parent-select">
            {% for t in available_parents %}
            <label class="tag-parent-option">
                <input type="checkbox" name="parent_ids" value="{{ t.id }}"
                       {% if t.id|in_list:parent_ids %}checked{% endif %}>
                {% if t.custom_icon %}<img src="{{ t.custom_icon.url }}" class="tag-parent-icon-img" alt="">
                {% elif t.icon %}<i class="material-icons" {% if t.color %}style="color:{{ t.color }}"{% endif %}>{{ t.icon }}</i>
                {% endif %}
                {{ t.name }}
            </label>
            {% endfor %}
        </div>
    </div>

    <div class="tag-form-actions">
        <button type="submit" class="btn-primary">Save</button>
        <button type="button" class="btn-ghost"
                hx-get="{% url 'tag.index' %}"
                hx-target="#tag-rows"
                hx-swap="innerHTML">Cancel</button>
    </div>
</form>

<script>
function editPickStandardIcon(tagId, iconKey, btn) {
    var customInput = document.getElementById('edit-custom-input-' + tagId);
    var hasNewFile = customInput && customInput.files && customInput.files.length > 0;
    var hasExisting = document.getElementById('edit-clear-custom-' + tagId) !== null;
    if (hasNewFile || hasExisting) {
        if (!confirm('Use this standard icon instead of your custom icon?')) return;
        if (customInput) customInput.value = '';
        var preview = document.getElementById('edit-custom-preview-' + tagId);
        if (preview) { preview.style.display = 'none'; preview.src = ''; }
        var glyph = document.getElementById('edit-upload-glyph-' + tagId);
        if (glyph) glyph.style.display = '';
        var uploadBtn = document.getElementById('edit-upload-btn-' + tagId);
        if (uploadBtn) uploadBtn.classList.remove('selected');
        var clearChk = document.getElementById('edit-clear-custom-' + tagId);
        if (clearChk) clearChk.checked = true;
    }
    document.getElementById('edit-icon-picker-' + tagId).querySelectorAll('.icon-option').forEach(function (b) { b.classList.remove('selected'); });
    btn.classList.add('selected');
    document.getElementById('edit-icon-value-' + tagId).value = iconKey;
}

function editPickCustomIcon(tagId, input) {
    if (!input.files || !input.files[0]) return;
    document.getElementById('edit-icon-picker-' + tagId).querySelectorAll('.icon-option').forEach(function (b) { b.classList.remove('selected'); });
    document.getElementById('edit-icon-value-' + tagId).value = '';
    var clearChk = document.getElementById('edit-clear-custom-' + tagId);
    if (clearChk) clearChk.checked = false;
    var reader = new FileReader();
    reader.onload = function (e) {
        var preview = document.getElementById('edit-custom-preview-' + tagId);
        preview.src = e.target.result;
        preview.style.display = 'block';
        var glyph = document.getElementById('edit-upload-glyph-' + tagId);
        if (glyph) glyph.style.display = 'none';
        document.getElementById('edit-upload-btn-' + tagId).classList.add('selected');
    };
    reader.readAsDataURL(input.files[0]);
}
</script>
