{% load dashboard_tags %}
<dialog id="{{ dialog_id_prefix }}{{ dialog_id_suffix }}" class="tag-add-dialog ul-dialog">
    {% include "dashboard/partials/ui/_dialog_header.html" with title="Add Labels" %}

    <div class="tad-tabs" role="tablist">
        <button class="tad-tab tad-tab--active" data-tab="all" role="tab">All</button>
        <button class="tad-tab" data-tab="tag" role="tab">Tags</button>
        <button class="tad-tab" data-tab="category" role="tab">Categories</button>
        <button class="tad-tab" data-tab="status" role="tab">Statuses</button>
    </div>

    <input type="search" class="dialog-search" placeholder="Search labels..." autocomplete="off">

    <ul class="tag-dialog-list">
        {% for label in all_labels %}
        {% if label.id not in member_ids %}
        <li class="tag-dialog-item" data-name="{{ label.name|lower }}" data-kind="{{ label.kind }}">
            <form hx-post="{% if membership_route == 'location' %}{% url 'label.location' label_kind=label_url_kind location_slug=obj_uuid %}{% elif membership_route == 'image' %}{% url 'label.image' image_uuid=obj_uuid %}{% else %}{% url 'label.pin' label_kind=label_url_kind pin_slug=obj_uuid %}{% endif %}" hx-target="#{{ panel_id }}" hx-swap="outerHTML">
                {% csrf_token %}
                <input type="hidden" name="label_id" value="{{ label.id }}">
                <input type="hidden" name="action" value="add">
                <button type="submit" class="tag-dialog-btn">
                    <span class="tag-dialog-icon">
                        {% if label.icon %}
                        {% if label.icon|is_material_icon %}<i class="material-icons" style="font-size:16px{% if label.color %};color:{{ label.color }}{% endif %}">{{ label.icon }}</i>
                        {% else %}<span>{{ label.icon }}</span>{% endif %}
                        {% else %}<i class="material-icons" style="font-size:16px;opacity:.3">label</i>{% endif %}
                    </span>
                    <span class="tag-dialog-name">{{ label.name }}</span>
                    <span class="tad-kind-pill tad-kind-pill--{{ label.kind }}">{{ label.get_kind_display }}</span>
                </button>
            </form>
        </li>
        {% endif %}
        {% endfor %}
    </ul>

    <div class="dialog-footer">
        <a href="{% url 'organize.index' %}?tab=tags" class="dialog-manage-link">
            <i class="material-symbols-outlined">settings</i> Manage labels
        </a>
    </div>
</dialog>
