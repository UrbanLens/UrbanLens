<div class="notif-dropdown" id="notif-dropdown">
  <div class="notif-dropdown__header">
    <span class="notif-dropdown__title">Notifications</span>
    {% if unread_count %}
    <button type="button" class="notif-mark-all-btn"
            hx-post="{% url 'notifications.read_all' %}"
            hx-target="#notif-dropdown"
            hx-swap="outerHTML"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
      Mark all read
    </button>
    {% endif %}
  </div>

  {% if notifications %}
  <ul class="notif-list" role="list">
    {% for n in notifications %}
    {% include "dashboard/partials/notification_item.html" %}
    {% endfor %}
  </ul>
  {% else %}
  <div class="notif-empty">
    <i class="material-icons notif-empty__icon" aria-hidden="true">notifications_none</i>
    <p class="notif-empty__text">You're all caught up</p>
    <p class="notif-empty__hint">New activity will appear here</p>
  </div>
  {% endif %}
</div>
