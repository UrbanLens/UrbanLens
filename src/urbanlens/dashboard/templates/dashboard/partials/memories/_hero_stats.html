<div class="memories-hero-stats">
    <div class="memories-stat-tile">
        <div class="memories-stat-icon"><i class="material-symbols-outlined">route</i></div>
        <div>
            <div class="memories-stat-value">{{ hero_stats.total_distance_km|floatformat:1 }} km</div>
            <div class="memories-stat-label">Distance traveled</div>
        </div>
    </div>
    <div class="memories-stat-tile">
        <div class="memories-stat-icon"><i class="material-symbols-outlined">pin_drop</i></div>
        <div>
            <div class="memories-stat-value">{{ hero_stats.places_visited }}</div>
            <div class="memories-stat-label">Places visited</div>
        </div>
    </div>
    <div class="memories-stat-tile">
        <div class="memories-stat-icon"><i class="material-symbols-outlined">photo_camera</i></div>
        <div>
            <div class="memories-stat-value">{{ hero_stats.photo_count }}</div>
            <div class="memories-stat-label">Photos</div>
        </div>
    </div>
    <div class="memories-stat-tile">
        <div class="memories-stat-icon"><i class="material-symbols-outlined">luggage</i></div>
        <div>
            <div class="memories-stat-value">{{ hero_stats.trip_count }}</div>
            <div class="memories-stat-label">Trips</div>
        </div>
    </div>
    <div class="memories-stat-tile">
        <div class="memories-stat-icon"><i class="material-symbols-outlined">calendar_month</i></div>
        <div>
            <div class="memories-stat-value">{{ hero_stats.years_active }}</div>
            <div class="memories-stat-label">Years active</div>
        </div>
    </div>
</div>
