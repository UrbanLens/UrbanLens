<div class="wikipedia-info card" id="wikipedia-section">
    <div class="card-header">
        <i class="material-icons">menu_book</i>
        <h3>Wikipedia</h3>
        <a href="{{ article.url }}" target="_blank" rel="noopener noreferrer"
           class="card-header-link" title="Open Wikipedia article">
            <i class="material-icons">open_in_new</i>
        </a>
    </div>

    <div class="wikipedia-body">
        {% if article.thumbnail %}
        <div class="wikipedia-thumb-wrap">
            <img class="wikipedia-thumb" src="{{ article.thumbnail }}" alt="{{ article.title }}" loading="lazy">
        </div>
        {% endif %}

        <div class="wikipedia-text">
            <h4 class="wikipedia-title">
                <a href="{{ article.url }}" target="_blank" rel="noopener noreferrer">
                    {{ article.title }}
                </a>
            </h4>
            {% if article.description %}
            <p class="wikipedia-description">{{ article.description }}</p>
            {% endif %}
            {% if article.extract %}
            <p class="wikipedia-extract">{{ article.extract|truncatechars:600 }}</p>
            {% endif %}
            <a href="{{ article.url }}" target="_blank" rel="noopener noreferrer"
               class="wikipedia-read-more">
                Read more on Wikipedia
                <i class="material-icons">arrow_forward</i>
            </a>
        </div>
    </div>
</div>
