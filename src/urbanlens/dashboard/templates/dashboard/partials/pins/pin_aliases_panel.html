<div id="pin-aliases-panel" class="aliases-panel card"
     data-collapse-scope="pin" data-collapse-section="aliases">
    <div class="card-header">
        <i class="material-symbols-outlined">label_important</i>
        <span>Aliases</span>
        <button type="button" class="btn btn--icon-sm" title="Add alias"
                onclick="this.closest('.aliases-panel').querySelector('.alias-add-input').focus()">
            <i class="material-symbols-outlined">add</i>
        </button>
    </div>
    <p class="aliases-description">Every name this pin is known by.</p>

    {% if aliases %}
    <div class="alias-chips-row">
        {% for alias in aliases %}
        <span class="alias-chip{% if alias.is_current %} alias-chip--current{% endif %}{% if alias.is_nickname %} alias-chip--nickname{% endif %}" id="alias-chip-{{ alias.id }}">
            <span class="alias-chip-name">{{ alias.name }}</span>
            <button type="button"
                    class="alias-chip-nickname-toggle{% if alias.is_nickname %} is-active{% endif %}"
                    title="{% if alias.is_nickname %}Nickname only - not used in external searches. Click to allow.{% else %}Click to mark as nickname-only (excluded from external searches).{% endif %}"
                    hx-post="{% url 'pin.alias.toggle_nickname' pin.slug alias.id %}"
                    hx-target="#pin-aliases-panel"
                    hx-swap="outerHTML">
                <i class="material-symbols-outlined">person</i>
            </button>
            {% if alias.is_current %}
            <span class="alias-chip-current-badge" title="Current name">current</span>
            {% else %}
            <button type="button"
                    class="alias-chip-use"
                    title="Use this name"
                    hx-post="{% url 'pin.alias.use' pin.slug alias.id %}"
                    hx-target="#pin-aliases-panel"
                    hx-swap="outerHTML">
                <i class="material-symbols-outlined">check</i>
            </button>
            <button type="button"
                    class="alias-chip-remove"
                    title="Remove alias"
                    hx-delete="{% url 'pin.alias.delete' pin.slug alias.id %}"
                    hx-target="#pin-aliases-panel"
                    hx-swap="outerHTML"
                    hx-confirm="Remove alias &ldquo;{{ alias.name }}&rdquo;?">
                <i class="material-symbols-outlined">close</i>
            </button>
            {% endif %}
        </span>
        {% endfor %}
    </div>
    {% else %}
    <p class="aliases-empty">No aliases yet.</p>
    {% endif %}

    <form class="alias-add-form"
          hx-post="{% url 'pin.aliases' pin.slug %}"
          hx-target="#pin-aliases-panel"
          hx-swap="outerHTML">
        {% csrf_token %}
        <input type="text" name="name" class="alias-add-input" placeholder="Add an alias..." maxlength="255" required>
        <label class="alias-nickname-check" title="Nickname-only aliases help you find your own pins, but are never sent to external APIs (Google, Wikipedia, etc).">
            <input type="checkbox" name="is_nickname" value="1">
            Nickname only
        </label>
        <button type="submit" class="alias-add-btn">
            <i class="material-symbols-outlined">add</i>
        </button>
    </form>
</div>
