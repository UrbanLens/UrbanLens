{% if result == "sent" %}
<div class="invite-result invite-result--success">
    <i class="material-symbols-outlined">check_circle</i>
    <span>If they're on UrbanLens, they've been sent a friend request. Otherwise, we've emailed them an invitation to join.</span>
</div>
{% else %}
<div class="invite-result invite-result--error">
    <i class="material-symbols-outlined">error</i>
    <span>Something went wrong. Please try again.</span>
</div>
{% endif %}
