<div id="trip-settings-content">
	{% if saved %}
	<div class="site-admin-notice site-admin-notice--success" style="margin-bottom:.75rem">
		<i class="material-icons">check_circle</i> Settings saved.
	</div>
	{% endif %}
	<form hx-post="{% url 'trips.settings' trip.uuid %}"
	      hx-target="#trip-settings-content"
	      hx-swap="innerHTML"
	      class="trip-create-form">
		{% csrf_token %}
		<div class="form-row">
			<label class="trip-setting-row">
				<span class="trip-setting-label">
					<strong>Allow members to add people</strong>
					<span class="trip-setting-desc">Members can invite other users to join this trip.</span>
				</span>
				<input type="checkbox" name="allow_add_members" value="on" class="trip-setting-check"
				       {% if trip.allow_add_members %}checked{% endif %}>
			</label>
		</div>
		<div class="form-row">
			<label class="trip-setting-row">
				<span class="trip-setting-label">
					<strong>Allow members to add activities</strong>
					<span class="trip-setting-desc">Members can add new activities to this trip.</span>
				</span>
				<input type="checkbox" name="allow_add_activities" value="on" class="trip-setting-check"
				       {% if trip.allow_add_activities %}checked{% endif %}>
			</label>
		</div>
		<div class="form-row">
			<label class="trip-setting-row">
				<span class="trip-setting-label">
					<strong>Allow members to edit activities</strong>
					<span class="trip-setting-desc">Members can edit and delete activities.</span>
				</span>
				<input type="checkbox" name="allow_edit_activities" value="on" class="trip-setting-check"
				       {% if trip.allow_edit_activities %}checked{% endif %}>
			</label>
		</div>
		<div class="form-row">
			<label class="trip-setting-row">
				<span class="trip-setting-label">
					<strong>Enable comments</strong>
					<span class="trip-setting-desc">Allow members to leave comments on this trip.</span>
				</span>
				<input type="checkbox" name="allow_comments" value="on" class="trip-setting-check"
				       {% if trip.allow_comments %}checked{% endif %}>
			</label>
		</div>
		<div class="form-actions">
			<button type="submit" class="submit-button">Save Settings</button>
		</div>
	</form>
</div>
