<div class="trip-detail-header">
    <div class="trip-detail-header-left">
        <a href="{% url 'trips.list' %}" class="trip-back-link">
            <i class="material-icons">arrow_back</i> Trips
        </a>
        <h1 class="trip-detail-title">{{ trip.name }}</h1>
        {% if trip.description %}
        <p class="trip-detail-description">{{ trip.description }}</p>
        {% endif %}
        {% if trip.start_date %}
        <div class="trip-detail-dates">
            <i class="material-icons">event</i>
            {{ trip.start_date|date:"M j, Y" }}{% if trip.end_date %} – {{ trip.end_date|date:"M j, Y" }}{% endif %}
        </div>
        {% endif %}
    </div>
    <div class="trip-detail-header-right">
        <button type="button" class="trip-header-btn trip-header-btn--edit"
                onclick="document.getElementById('edit-trip-dialog').showModal()">
            <i class="material-icons">edit</i> Edit
        </button>
        {% if trip.creator == profile %}
        <button type="button" class="trip-header-btn trip-header-btn--delete"
                hx-delete="{% url 'trips.delete' trip.uuid %}"
                hx-confirm="Permanently delete this trip and all its activities?"
                hx-on::after-request="if(event.detail.successful){window.location='{% url 'trips.list' %}'}">
            <i class="material-icons">delete_outline</i> Delete
        </button>
        {% endif %}
    </div>
</div>
