{% comment %}
Grace period slider: how long after the expected check-in time before contacts
are notified. Context: `value` (current hours, float) and optional `dom_id`
(defaults to "grace_period_hours" - only override when included more than once
on the same page).
{% endcomment %}
<div class="safety-grace-slider" data-role="grace-slider">
    <input type="range" class="safety-grace-slider-range" name="grace_period_hours"
           id="{{ dom_id|default:'grace_period_hours' }}" data-role="range"
           min="1" max="48" step="1" value="{{ value|default:'1' }}">
    <output class="safety-grace-slider-output" data-role="output" for="{{ dom_id|default:'grace_period_hours' }}"></output>
</div>

<script>
(function () {
    document.querySelectorAll('.safety-grace-slider[data-role="grace-slider"]').forEach(function (root) {
        if (root.dataset.gracePickerInit) return;
        root.dataset.gracePickerInit = '1';

        var range = root.querySelector('[data-role="range"]');
        var output = root.querySelector('[data-role="output"]');

        function format(value) {
            var hours = Math.round(parseFloat(value) * 100) / 100;
            var label = hours % 1 === 0 ? hours.toFixed(0) : hours.toString();
            return label + ' hour' + (hours === 1 ? '' : 's');
        }
        function refresh() { output.textContent = format(range.value); }

        range.addEventListener('input', refresh);
        refresh();
    });
}());
</script>
