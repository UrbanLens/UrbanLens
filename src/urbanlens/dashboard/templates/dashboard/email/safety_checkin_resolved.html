<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#f0fdf4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f0fdf4;padding:40px 16px">
<tr><td align="center">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1)">

  <tr>
    <td style="background:linear-gradient(135deg,#14532d,#15803d,#22c55e);padding:32px 32px 24px;text-align:center">
      <p style="margin:0;color:#bbf7d0;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase">UrbanLens Safety</p>
      <h1 style="margin:8px 0 0;color:#fff;font-size:24px;font-weight:800;letter-spacing:-.02em">Check-in resolved</h1>
    </td>
  </tr>

  <tr>
    <td style="padding:32px">
      <p style="margin:0 0 24px;color:#374151;font-size:15px;line-height:1.6">
        {{ contact.display_name }} marked <strong>{{ checkin.profile.username }}</strong> safe for
        "<strong>{{ checkin.title }}</strong>".
      </p>

      <div style="text-align:center;margin:28px 0">
        <a href="{{ checkin_url }}"
           style="display:inline-block;background:#16a34a;color:#fff;text-decoration:none;
                  font-size:15px;font-weight:700;padding:14px 32px;border-radius:10px;
                  letter-spacing:.01em">
          View check-in
        </a>
      </div>
    </td>
  </tr>

</table>
</td></tr>
</table>
</body>
</html>
