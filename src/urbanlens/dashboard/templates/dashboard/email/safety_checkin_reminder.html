<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#f0f4ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f4ff;padding:40px 16px">
<tr><td align="center">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1)">

  <tr>
    <td style="background:linear-gradient(135deg,#312e81,#4338ca,#6366f1);padding:32px 32px 24px;text-align:center">
      <p style="margin:0;color:#a5b4fc;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase">UrbanLens Safety</p>
      <h1 style="margin:8px 0 0;color:#fff;font-size:24px;font-weight:800;letter-spacing:-.02em">Time to check in</h1>
    </td>
  </tr>

  <tr>
    <td style="padding:32px">
      <p style="margin:0 0 16px;color:#374151;font-size:15px;line-height:1.6">
        Your safety check-in <strong>"{{ checkin.title }}"</strong> is due.
      </p>
      <p style="margin:0 0 24px;color:#6b7280;font-size:14px;line-height:1.65">
        If we don't hear from you within {{ checkin.grace_period }}, your emergency contacts will be notified.
      </p>

      <div style="text-align:center;margin:28px 0">
        <a href="{{ checkin_url }}"
           style="display:inline-block;background:#4f46e5;color:#fff;text-decoration:none;
                  font-size:15px;font-weight:700;padding:14px 32px;border-radius:10px;
                  letter-spacing:.01em">
          Check in now
        </a>
      </div>

      <p style="margin:0;color:#9ca3af;font-size:12px;line-height:1.5;border-top:1px solid #e5e7eb;padding-top:20px">
        If you didn't set up this check-in, you can ignore this email.
      </p>
    </td>
  </tr>

</table>
</td></tr>
</table>
</body>
</html>
