<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f3f4f6;padding:40px 16px">
<tr><td align="center">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1)">

  <tr>
    <td style="background:linear-gradient(135deg,#1f2937,#374151,#4b5563);padding:32px 32px 24px;text-align:center">
      <p style="margin:0;color:#d1d5db;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase">UrbanLens Account</p>
      <h1 style="margin:8px 0 0;color:#fff;font-size:24px;font-weight:800;letter-spacing:-.02em">Your account has been deleted</h1>
    </td>
  </tr>

  <tr>
    <td style="padding:32px">
      <p style="margin:0 0 16px;color:#374151;font-size:15px;line-height:1.6">
        The UrbanLens account for <strong>{{ username }}</strong> and all its data have been permanently
        deleted, as requested.
      </p>
      <p style="margin:0;color:#9ca3af;font-size:12px;line-height:1.5;border-top:1px solid #e5e7eb;padding-top:20px">
        This is a final confirmation - no action is needed. If you didn't request this deletion, contact
        support right away.
      </p>
    </td>
  </tr>

</table>
</td></tr>
</table>
</body>
</html>
