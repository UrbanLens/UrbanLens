<!DOCTYPE html>
<html id="html-root" {% if request.user.is_authenticated and request.user.profile.dark_mode %}data-theme="dark"{% endif %}>

<head>
    <meta charset="utf-8">
    <title>Dashboard View</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <script src="https://code.jquery.com/jquery-4.0.0-beta.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    {% load static %}
    {% block header %}{% endblock %}
    <link rel="stylesheet" type="text/css" href="{% static 'dashboard/style.css' %}">
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}" />

    <!-- Compiled and minified JavaScript -->
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body class="{% if page_name %}page-{{ page_name }}{% endif %}">
    {% include 'dashboard/partials/header.html' %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% include 'dashboard/partials/footer.html' %}

    <!--  Scripts-->
    {% if messages %}
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        {% for message in messages %}
        toastr['{{ message.tags }}']('{{ message.message|escapejs }}');
        {% endfor %}
    });
    </script>
    {% endif %}
    <script>
        var csrftoken = '{{ csrf_token }}';
        // Include CSRF token in all HTMX requests (needed for DELETE/PUT/PATCH)
        document.body.addEventListener('htmx:configRequest', function (evt) {
            evt.detail.headers['X-CSRFToken'] = csrftoken;
        });
        toastr.options = {
            positionClass: 'toast-bottom-right',
            progressBar: true,
            timeOut: 4000,
            tapToDismiss: true,
            newestOnTop: true,
        };

        // Global: disable submit buttons during HTMX form requests to prevent double-submit
        (function () {
            function _submitBtns(el) {
                if (!el) return [];
                var form = el.tagName === 'FORM' ? el : (el.closest ? el.closest('form') : null);
                return form ? Array.from(form.querySelectorAll('button[type="submit"].submit-button, input[type="submit"]')) : [];
            }
            document.body.addEventListener('htmx:beforeRequest', function (e) {
                _submitBtns(e.target).forEach(function (btn) {
                    btn.classList.add('is-loading');
                    btn.disabled = true;
                });
            });
            document.body.addEventListener('htmx:afterRequest', function (e) {
                _submitBtns(e.target).forEach(function (btn) {
                    btn.classList.remove('is-loading');
                    btn.disabled = false;
                });
            });
        }());
    </script>
    <script>
    // ── Comment utilities ─────────────────────────────────────────────────────

    function toggleReplyForm(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.hidden = !el.hidden;
        if (!el.hidden) {
            var ta = el.querySelector('textarea');
            if (ta) setTimeout(function () { ta.focus(); }, 30);
        }
    }

    function toggleReactionPicker(btn) {
        var popup = btn.parentElement && btn.parentElement.querySelector('.reaction-picker-popup');
        if (!popup) return;
        document.querySelectorAll('.reaction-picker-popup:not([hidden])').forEach(function (p) {
            if (p !== popup) p.hidden = true;
        });
        popup.hidden = !popup.hidden;
    }

    document.addEventListener('click', function (e) {
        if (!e.target.closest('.reaction-picker')) {
            document.querySelectorAll('.reaction-picker-popup:not([hidden])').forEach(function (p) {
                p.hidden = true;
            });
        }
    });

    // ── @mention autocomplete ─────────────────────────────────────────────────
    (function () {
        var _timer = null;

        function _query(ta) {
            var pos = ta.selectionStart;
            var before = ta.value.substring(0, pos);
            var atIdx = before.lastIndexOf('@');
            if (atIdx === -1) return null;
            var frag = before.substring(atIdx + 1);
            if (/\s/.test(frag)) return null;
            return { start: atIdx, query: frag };
        }

        function _showDropdown(ta, items, onSelect) {
            var wrap = ta.closest('.comment-input-wrap');
            var dd = wrap && wrap.querySelector('.mention-dropdown');
            if (!dd) return;
            dd.innerHTML = '';
            if (!items.length) { dd.hidden = true; return; }
            items.forEach(function (item) {
                var div = document.createElement('div');
                div.className = 'mention-option';
                div.innerHTML = '<span class="mention-option__name">' +
                    item.name.replace(/&/g, '&amp;').replace(/</g, '&lt;') + '</span>';
                div.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    onSelect(item);
                    dd.hidden = true;
                    dd.innerHTML = '';
                });
                dd.appendChild(div);
            });
            dd.hidden = false;
        }

        function _hide(ta) {
            var wrap = ta.closest('.comment-input-wrap');
            var dd = wrap && wrap.querySelector('.mention-dropdown');
            if (dd) { dd.hidden = true; dd.innerHTML = ''; }
        }

        function _insert(ta, start, text) {
            var pos = ta.selectionStart;
            ta.value = ta.value.substring(0, start) + text + ' ' + ta.value.substring(pos);
            var cur = start + text.length + 1;
            ta.setSelectionRange(cur, cur);
            ta.focus();
        }

        function _fetch(ta) {
            var q = _query(ta);
            if (!q || q.query.length < 1) { _hide(ta); return; }
            var ctx = ta.dataset.contextType || '';
            var tripUuid = ta.dataset.tripUuid || '';
            var isNum = /^\d+$/.test(q.query);

            if (isNum && ctx === 'trip' && tripUuid) {
                fetch('/dashboard/trips/' + encodeURIComponent(tripUuid) + '/map-data/', {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    var pts = (data.points || []).filter(function (p) {
                        return String(p.index).startsWith(q.query);
                    });
                    _showDropdown(ta, pts.map(function (p) {
                        return { name: '#' + p.index + ' – ' + p.label, actIndex: p.index };
                    }), function (item) {
                        _insert(ta, q.start, '@act:' + item.actIndex);
                    });
                })
                .catch(function () {});
            } else {
                fetch('/dashboard/comments/locations/?q=' + encodeURIComponent(q.query), {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(function (r) { return r.json(); })
                .then(function (results) {
                    _showDropdown(ta, results, function (item) {
                        _insert(ta, q.start, '@[' + item.name + '](loc:' + item.uuid + ')');
                    });
                })
                .catch(function () {});
            }
        }

        document.addEventListener('input', function (e) {
            if (!e.target.classList.contains('mention-input')) return;
            clearTimeout(_timer);
            var ta = e.target;
            _timer = setTimeout(function () { _fetch(ta); }, 200);
        });

        document.addEventListener('keydown', function (e) {
            if (!e.target.classList.contains('mention-input')) return;
            var ta = e.target;
            var wrap = ta.closest('.comment-input-wrap');
            var dd = wrap && wrap.querySelector('.mention-dropdown');
            if (!dd || dd.hidden) return;
            var opts = Array.from(dd.querySelectorAll('.mention-option'));
            var cur = dd.querySelector('.mention-option.is-selected');
            var idx = cur ? opts.indexOf(cur) : -1;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (cur) cur.classList.remove('is-selected');
                var nxt = opts[Math.min(idx + 1, opts.length - 1)];
                if (nxt) nxt.classList.add('is-selected');
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (cur) cur.classList.remove('is-selected');
                var prv = opts[Math.max(idx - 1, 0)];
                if (prv) prv.classList.add('is-selected');
            } else if ((e.key === 'Enter' || e.key === 'Tab') && cur) {
                e.preventDefault();
                cur.dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
            } else if (e.key === 'Escape') {
                dd.hidden = true;
                dd.innerHTML = '';
            }
        });

        document.addEventListener('click', function (e) {
            if (!e.target.classList.contains('mention-input')) {
                document.querySelectorAll('.mention-dropdown:not([hidden])').forEach(function (dd) {
                    dd.hidden = true;
                    dd.innerHTML = '';
                });
            }
        });
    }());

    // ── Activity mention hover → highlight trip map marker ────────────────────
    document.addEventListener('mouseover', function (e) {
        var link = e.target.closest && e.target.closest('.mention--activity');
        if (!link || !window.tripHighlightMarker) return;
        var id = link.dataset.activityId;
        if (id) window.tripHighlightMarker(id, true);
    });
    document.addEventListener('mouseout', function (e) {
        var link = e.target.closest && e.target.closest('.mention--activity');
        if (!link || !window.tripHighlightMarker) return;
        var id = link.dataset.activityId;
        if (id) window.tripHighlightMarker(id, false);
    });
    </script>

    {% block scripts %}{% endblock %}

</body>

</html>
