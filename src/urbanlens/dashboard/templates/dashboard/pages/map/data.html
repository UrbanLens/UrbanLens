<div id="map-body">
<script>
    pinsLayerGroup.clearLayers();
    if (window._loadedPinUuids) { window._loadedPinUuids.clear(); }

    {% for pin in map_data %}
    addMarker({
        latitude: "{{ pin.latitude }}",
        longitude: "{{ pin.longitude }}",
        icon: "{{ pin.icon|default_if_none:'' }}",
        color: "{{ pin.color|default_if_none:'' }}",
        uuid: "{{ pin.uuid }}",
        name: "{{ pin.name|default_if_none:''|escapejs }}",
        description: "{{ pin.description|default_if_none:''|escapejs }}",
        rating: "{{ pin.rating|stringformat:'s' }}",
        status: "{{ pin.status|default_if_none:''|escapejs }}",
        categories: "{{ pin.categories|default_if_none:''|escapejs }}",
        last_visited: "{{ pin.last_visited|default_if_none:'Never'|escapejs }}",
        tags: "{{ pin.tags|default_if_none:''|escapejs }}",
        viewLocationUrl: "{% url 'pin.details' pin.uuid %}"
    });
    {% endfor %}
    if (window.updatePinCounter) { window.updatePinCounter(); }
</script>
</div>
