
        <div class="dialog-overlay" id="addPinScreen"></div>
        <div class="dialog" id="addPinModal">
            <button class="btn-close" id="closeDialog" aria-label="Close">×</button>
            <h2>Add Location</h2>
            <form id="addPinForm" method="POST" action="{% url 'pin.add' %}" hx-post="{% url 'pin.add' %}" hx-trigger="submit" hx-target="#map" hx-swap="outerHTML">
			    <label for="name">Name</label>
			    <input type="text" id="name" name="name" autocomplete="name" placeholder="Location name" required><br>
			    <label for="latitude" style="margin-top:12px">Latitude</label>
			    <input type="text" id="latitude" name="latitude" autocomplete="latitude" pattern="^-?([1-8]?[1-9]|[1-9]0)\.{1}\d{1,6}" placeholder="Click map to set" readonly><br>
			    <label for="longitude" style="margin-top:12px">Longitude</label>
			    <input type="text" id="longitude" name="longitude" autocomplete="longitude" pattern="^-?([1-8]?[1-9]|[1-9]0)\.{1}\d{1,6}" placeholder="Click map to set" readonly><br>
			    <div id="iconGrid" class="icon-grid" style="margin-top:16px">
				    <i class="pin bank" data-value="bank" title="Bank"></i>
				    <i class="pin car" data-value="car" title="Car"></i>
				    <i class="pin church" data-value="church" title="Church"></i>
				    <i class="pin firehouse" data-value="firehouse" title="Firehouse"></i>
				    <i class="pin hospital" data-value="hospital" title="Hospital"></i>
				    <i class="pin military" data-value="military" title="Military"></i>
				    <i class="pin plane" data-value="plane" title="Airport/Plane"></i>
				    <i class="pin school" data-value="school" title="School"></i>
				    <i class="pin tunnel" data-value="tunnel" title="Tunnel"></i>
				    <i class="pin boat" data-value="boat" title="Boat/Dock"></i>
				    <i class="pin castle" data-value="castle" title="Castle"></i>
				    <i class="pin dam" data-value="dam" title="Dam"></i>
				    <i class="pin graffiti" data-value="graffiti" title="Graffiti"></i>
				    <i class="pin house" data-value="house" title="House"></i>
				    <i class="pin museum" data-value="museum" title="Museum"></i>
				    <i class="pin powerplant" data-value="powerplant" title="Power Plant"></i>
				    <i class="pin statue" data-value="statue" title="Statue"></i>
				    <i class="pin bridge" data-value="bridge" title="Bridge"></i>
				    <i class="pin cave" data-value="cave" title="Cave"></i>
				    <i class="pin factory" data-value="factory" title="Factory"></i>
				    <i class="pin graveyard" data-value="graveyard" title="Graveyard"></i>
				    <i class="pin library" data-value="library" title="Library"></i>
				    <i class="pin park" data-value="park" title="Park"></i>
				    <i class="pin prison" data-value="prison" title="Prison"></i>
				    <i class="pin train" data-value="train" title="Train Station"></i>
			    </div>
			    <input type="hidden" id="selectedIcon" name="icon">

			    <div class="pin-privacy-toggle" style="margin-top:16px; display:flex; align-items:center; gap:8px;">
			    <label class="toggle-switch"
			           data-tooltip="Private pins are stored only on your account. They are never linked to a community wiki page and your nickname, notes, and coordinates remain completely invisible to others."
			           title="Private pins are kept entirely personal and will not appear on the community wiki.">
				    <input type="checkbox" id="isPrivate" name="is_private" value="1">
				    <span class="toggle-slider"></span>
			    </label>
			    <span class="pin-privacy-label">
				    <i class="material-icons" style="font-size:16px; vertical-align:middle;">lock</i>
				    Private pin
			    </span>
			    <span class="pin-privacy-hint" style="font-size:12px; color:var(--text-muted, #888);">
				    (no community wiki entry)
			    </span>
		    </div>

		    <input type="button" id="submitAddPinForm" value="Add Pin" class="submit-button">
            </form>

		    <script>
			    function closeDialog( removePin = true ) {
				    var screen = document.getElementById('addPinScreen');
				    var dialog = document.getElementById('addPinModal');

				    if (removePin) {
					    if (window.pin) {
						    window.pin.remove();
						    window.pin.closePopup();
						    window.pin.closeTooltip();
						    window.map.removeLayer(window.pin);
						    window.pin = null;
					    }
				    }

				    if (screen) screen.remove();
				    if (dialog) dialog.style.display = 'none';
			    }

			    function initializeDialog() {
				    var iconGrid = document.getElementById('iconGrid');
				    var selectedIconInput = document.getElementById('selectedIcon');
				    var closeBtn = document.getElementById('closeDialog');
				    var screen = document.getElementById('addPinScreen');

				    iconGrid.addEventListener('click', function(e) {
					    if (e.target.tagName === 'I') {
						    selectedIconInput.value = e.target.dataset.value;
						    document.querySelectorAll('#iconGrid i').forEach(function(icon) {
							    icon.classList.remove('selected');
						    });
						    e.target.classList.add('selected');
						    if (window.pin) {
							    var iconName = e.target.classList[1];
							    window.pin.setIcon(L.divIcon({
								    className: iconName,
								    html: '<i class="pin ' + iconName + '"></i>',
								    iconSize: [30, 42],
								    iconAnchor: [15, 42]
							    }));
						    }
					    }
				    });

				    if (screen) screen.addEventListener('click', function() { closeDialog(); });
				    if (closeBtn) closeBtn.addEventListener('click', function() { closeDialog(); });
			    }
			    document.addEventListener('dialogLoaded', function() { initializeDialog(); });

			    document.getElementById('submitAddPinForm').addEventListener('click', function(e) {
				    e.preventDefault();
				    var form = document.getElementById('addPinForm');
				    var formData = new FormData(form);
				    fetch(form.action, {
					    method: 'POST',
					    body: formData,
					    headers: { 'X-CSRFToken': '{{ csrf_token }}' }
				    })
				    .then(function(response) {
					    if (!response.ok) throw new Error('Network response was not ok');
					    toastr.success('Location added successfully!');
					    closeDialog(false);
				    })
				    .catch(function(error) {
					    console.error('Error:', error);
					    toastr.error('Failed to add location');
				    });
			    });
		    </script>

        </div>
