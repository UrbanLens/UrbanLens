{% extends 'dashboard/themes/base.html' %}

{% block content %}
<div class="trip-error-page page-content">
    <div class="trip-error-icon">
        <i class="material-icons">search_off</i>
    </div>
    <h1 class="trip-error-title">Page Not Found</h1>
    <p class="trip-error-body">
        The page you're looking for doesn't exist or may have been moved.
    </p>
    <div class="trip-error-actions">
        <a href="{% url 'home' %}" class="submit-button">
            <i class="material-icons" style="font-size:1rem;vertical-align:middle">home</i>
            Go Home
        </a>
        <a href="{% url 'map.view' %}" class="btn-ghost">Open Map</a>
    </div>
</div>
{% endblock %}
