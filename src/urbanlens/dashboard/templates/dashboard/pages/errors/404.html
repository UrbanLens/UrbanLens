{% extends 'dashboard/themes/base.html' %}

{% block content %}
<div class="error-page page-content">
    <div class="error-page__code">404</div>
    <div class="error-page__icon">
        <i class="material-icons">explore_off</i>
    </div>
    <h1 class="error-page__title">{% block error_title %}Page Not Found{% endblock %}</h1>
    <p class="error-page__body">{% block error_body %}The page you're looking for doesn't exist or may have been moved.{% endblock %}</p>
    <div class="error-page__actions">
        <a href="{% url 'home' %}" class="submit-button btn btn--primary btn--lg">
            <i class="material-icons" style="font-size:1rem;vertical-align:middle">home</i>
            Go Home
        </a>
        <a href="{% url 'map.view' %}" class="btn btn--ghost">Open Map</a>
    </div>
</div>
{% endblock %}
