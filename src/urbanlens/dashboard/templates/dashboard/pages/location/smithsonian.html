{% if images %}
<div class="smithsonian-images card" id="smithsonian-section"
     data-collapse-scope="pin" data-collapse-section="smithsonian">
    <div class="card-header">
        <i class="material-icons">collections</i>
        <h3>Smithsonian Archives</h3>
        {% if page_obj.paginator.count %}<span class="badge">{{ page_obj.paginator.count }}</span>{% endif %}
    </div>
    <div class="smithsonian-grid">
        {% for image in images %}
        {% if image.url %}
        <div class="smithsonian-image">
            <a href="{{ image.url }}" target="_blank" rel="noopener">
                <img src="{{ image.thumbnail }}" alt="{{ image.title }}" loading="lazy">
                <span class="smithsonian-title">{{ image.title }}</span>
            </a>
        </div>
        {% endif %}
        {% endfor %}
    </div>
    {% include "dashboard/partials/_pagination_controls.html" %}
</div>
{% else %}
<span hidden id="smithsonian-section"></span>
{% endif %}
