<div id="street-view-section" class="street-view card">
    <div class="card-header">
        <i class="material-icons">streetview</i>
        <h3>Street View</h3>
    </div>
    {% if image_b64 %}
    <img src="data:image/jpeg;base64,{{ image_b64 }}"
         alt="Street view{% if pin %} of {{ pin.effective_name }}{% endif %}"
         class="view-image">
    {% else %}
    <div class="view-unavailable">
        <i class="material-icons">broken_image</i>
        <span>{{ error|default:"Street view unavailable." }}</span>
    </div>
    {% endif %}
</div>
