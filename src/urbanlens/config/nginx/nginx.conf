worker_processes 2;

error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # nginx-unprivileged: write temp files to /tmp, not the root-owned defaults
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # Header/nav widgets (unread-count badge, safety banner, friend list) reload
    # on every page navigation, and the notification socket reconnects with them -
    # logging all of that drowns out real traffic. Skip logging just the
    # successful hits; non-2xx/non-101 responses from these still get logged so
    # real failures (auth errors, 5xxs) stay visible.
    map $request_uri $is_polling_endpoint {
        default                                    0;
        ~^/dashboard/notifications/unread-count/   1;
        ~^/dashboard/safety/nav-banner/             1;
        ~^/dashboard/friendship/list/               1;
        ~^/ws/notifications/                        1;
    }

    map $status $is_success_status {
        default    0;
        ~^(2|101)  1;
    }

    map "$is_polling_endpoint:$is_success_status" $loggable {
        default  1;
        "1:1"    0;
    }

    access_log  /var/log/nginx/access.log  main if=$loggable;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_types text/css text/javascript application/javascript application/json text/xml application/xml;

    include /etc/nginx/conf.d/*.conf;
}
