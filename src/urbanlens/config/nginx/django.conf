# Forward the scheme the request REALLY arrived with, instead of asserting
# https unconditionally. When the TLS-terminating front door (Cloudflare
# Tunnel / NPM) sets X-Forwarded-Proto, pass it through; when the header is
# absent (front door misconfigured, or something reaching this nginx
# directly), fall back to the actual scheme nginx observed. This is what
# lets Django's SECURE_SSL_REDIRECT actually fire for genuine plain-HTTP
# requests - the old hardcoded "https" made every request look secure, so
# the redirect could never trigger. A client spoofing "https" over plain
# HTTP only skips its own redirect (exactly today's behavior for everyone),
# and Secure cookies are still browser-enforced over real TLS only, so this
# strictly tightens enforcement without adding trust in the client.
map $http_x_forwarded_proto $forwarded_scheme {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 8080;
    server_name localhost;

    # This nginx always sits behind a TLS-terminating front door (Cloudflare
    # Tunnel today, NGINX Proxy Manager in the future), so $remote_addr here
    # is the front door's IP, not the visitor's. Trust its X-Forwarded-For
    # instead. Docker's default bridge subnets fall in 172.16.0.0/12; if the
    # front door lives elsewhere (a different docker network, or another
    # host), confirm the real source with `docker network inspect` / access
    # logs and narrow this range accordingly.
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Generous ceiling so large Google Takeout location-history exports and
    # multi-photo batches aren't rejected before Django can even respond;
    # tune as needed.
    client_max_body_size 200m;

    location / {
        proxy_pass http://urbanlens_app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
    }

    # Routed to the dedicated `app-ws` Daphne service (docker-compose.yml) - the
    # main `app` service above never sees WebSocket traffic. proxy_read_timeout
    # is raised well past nginx's 60s default so idle chat connections aren't
    # dropped between messages.
    location /ws/ {
        proxy_pass http://urbanlens_app_ws:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
        proxy_read_timeout 3600s;
    }

    location /static/ {
        alias /app/src/urbanlens/frontend/static/;
    }

    # User-uploaded media is NOT served off disk here: /media/ requests go to
    # Django (dashboard.controllers.media.MediaGateView), which authenticates
    # and authorizes the requester and then answers with an X-Accel-Redirect
    # into the internal-only location below, letting nginx stream the actual
    # bytes. Serving /media/ directly (the old configuration) let anyone who
    # guessed a filename fetch any user's photos with no auth check.
    location /media/ {
        proxy_pass http://urbanlens_app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
    }

    # Only reachable via X-Accel-Redirect from the Django media gate above -
    # `internal` makes direct client requests for /_protected_media/... 404.
    # The alias must point at the same media_volume mount the app containers
    # use (docker-compose.yml mounts it at /app/src/urbanlens/media), and the
    # path prefix must match MEDIA_X_ACCEL_PREFIX in settings/base.py.
    location /_protected_media/ {
        internal;
        alias /app/src/urbanlens/media/;
    }

    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}