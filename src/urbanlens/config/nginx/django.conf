server {
    listen 8080;
    server_name localhost;

    # This nginx always sits behind a TLS-terminating front door (Cloudflare
    # Tunnel today, NGINX Proxy Manager in the future), so $remote_addr here
    # is the front door's IP, not the visitor's. Trust its X-Forwarded-For
    # instead. Docker's default bridge subnets fall in 172.16.0.0/12; if the
    # front door lives elsewhere (a different docker network, or another
    # host), confirm the real source with `docker network inspect` / access
    # logs and narrow this range accordingly.
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Matches the largest expected photo upload; tune as needed.
    client_max_body_size 25m;

    location / {
        proxy_pass http://urbanlens_app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /static/ {
        alias /app/src/urbanlens/frontend/static/;
    }

    location /media/ {
        alias /app/src/urbanlens/media/;
    }

    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}