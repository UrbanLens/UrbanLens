# Shared build configuration - all three app containers use the same image.
# UL_ENVIRONMENT is passed as a build arg (not just a runtime env var) so the
# Dockerfile can `uv sync --no-dev` for staging/production builds instead of
# `uv sync` (which pulls in the `dev` dependency-group: linters, mypy, pytest, etc).
x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    UL_ENVIRONMENT: ${UL_ENVIRONMENT:-production}
    UL_CONTAINER_NAME: ${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}

# Full environment for the app server and celery workers (need all API keys).
# UL_PG_DUMP_BIN bypasses the pg_wrapper dispatcher and calls the versioned
# binary directly, which avoids the "install postgresql-client-<ver>" error
# when the wrapper can't find a local cluster matching the remote server.
x-app-env: &app-env
  # Read natively by gunicorn (no --workers flag is passed in package.json's
  # `start` script) - without this, gunicorn defaults to a single worker
  # process, so every concurrent request across every user shares one gevent
  # event loop. A handful of slow/hanging external API calls (see
  # timeout_utils.call_with_deadline) can then wedge that single loop and
  # freeze the entire site for everyone, not just the request that triggered
  # them.
  WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
  UL_DB_USER: ${UL_DB_USER:-postgres}
  UL_DB_NAME: ${UL_DB_NAME:-postgres}
  UL_DB_PASS: ${UL_DB_PASS:-postgres}
  UL_DB_HOST: ${UL_DB_HOST:-urbanlens_db}
  UL_DB_PORT: ${UL_DB_PORT:-5432}
  UL_APP_PORT: ${UL_APP_PORT:-21800}
  UL_ENVIRONMENT: ${UL_ENVIRONMENT:-production}
  UL_SITE_URL: ${UL_SITE_URL:-http://localhost:21080}
  UL_GOOGLE_CLIENT_ID: ${UL_GOOGLE_CLIENT_ID}
  UL_GOOGLE_CLIENT_SECRET: ${UL_GOOGLE_CLIENT_SECRET}
  UL_DISCORD_CLIENT_ID: ${UL_DISCORD_CLIENT_ID}
  UL_DISCORD_CLIENT_SECRET: ${UL_DISCORD_CLIENT_SECRET}
  UL_GOOGLE_UNRESTRICTED_API_KEY: ${UL_GOOGLE_UNRESTRICTED_API_KEY}
  UL_GOOGLE_DOMAIN_RESTRICTED_API_KEY: ${UL_GOOGLE_DOMAIN_RESTRICTED_API_KEY}
  UL_GOOGLE_SEARCH_TENANT: ${UL_GOOGLE_SEARCH_TENANT}
  UL_GOOGLE_SEARCH_CX: ${UL_GOOGLE_SEARCH_CX:-${UL_GOOGLE_SEARCH_TENANT}}
  UL_OPENWEATHERMAP_API_KEY: ${UL_OPENWEATHERMAP_API_KEY}
  UL_NPS_API_KEY: ${UL_NPS_API_KEY}
  UL_OPENAI_API_KEY: ${UL_OPENAI_API_KEY}
  UL_SMITHSONIAN_API_KEY: ${UL_SMITHSONIAN_API_KEY}
  UL_VALKEY_URL: ${UL_VALKEY_URL:-redis://urbanlens_valkey:6379/0}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  UL_PG_DUMP_BIN: /usr/lib/postgresql/17/bin/pg_dump

# Minimal environment for celery-beat - only needs DB + broker to schedule tasks.
x-beat-env: &beat-env
  UL_DB_USER: ${UL_DB_USER:-postgres}
  UL_DB_NAME: ${UL_DB_NAME:-postgres}
  UL_DB_PASS: ${UL_DB_PASS:-postgres}
  UL_DB_HOST: ${UL_DB_HOST:-urbanlens_db}
  UL_DB_PORT: ${UL_DB_PORT:-5432}
  UL_ENVIRONMENT: ${UL_ENVIRONMENT:-production}
  UL_VALKEY_URL: ${UL_VALKEY_URL:-redis://urbanlens_valkey:6379/0}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}

# Project name is derived from the environment so each of prod/dev/test/staging
# gets its own Compose namespace - this prefixes default (unnamed) networks and
# volumes automatically, in addition to the explicit container_names below.
name: urbanlens-${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}

services:
  app:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_app
    build:
      <<: *app-build

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

    volumes:
      - logs:/var/log/urbanlens
      - static_volume:/app/src/urbanlens/frontend/static
      - media_volume:/app/src/urbanlens/media
      - backups:/app/src/backups

    networks:
      app_network:
        aliases:
          - urbanlens_app

    environment:
      <<: *app-env

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Dedicated ASGI (Daphne) process for WebSocket traffic only (safety check-in
  # chat, etc). `app` above keeps serving 100% of normal HTTP via gunicorn+gevent
  # unchanged - nginx routes just /ws/ to this service (see config/nginx/django.conf).
  app-ws:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_app_ws
    build:
      <<: *app-build

    restart: unless-stopped

    entrypoint: ["/docker-entrypoint.sh", "daphne"]
    # Daphne logs an access line to stdout for every request by default (verbosity=1),
    # including the docker healthcheck hitting /health/ every 30s - that's pure noise
    # in `docker logs`. Route it to the shared log volume instead so it's still on
    # disk for debugging WS issues (see channels_redis timeout tuning) without
    # flooding the console.
    command: ["-b", "0.0.0.0", "-p", "8001", "--access-log", "/var/log/urbanlens/daphne-access.log", "urbanlens.UrbanLens.asgi:application"]

    # `app`'s own entrypoint runs bin/init.py (migrate + collectstatic) before
    # its healthcheck can pass - waiting on `app` being healthy, not just
    # db/valkey, is what actually guarantees the schema and static manifest
    # this container's WebSocket consumers depend on exist before it serves
    # any traffic. app-ws never runs migrate/collectstatic itself.
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      app:
        condition: service_healthy

    volumes:
      - logs:/var/log/urbanlens
      - static_volume:/app/src/urbanlens/frontend/static

    networks:
      app_network:
        aliases:
          - urbanlens_app_ws

    environment:
      <<: *app-env

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_nginx
    image: nginxinc/nginx-unprivileged:alpine
    volumes:
      - static_volume:/app/src/urbanlens/frontend/static
      - media_volume:/app/src/urbanlens/media
      - ./src/urbanlens/config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/urbanlens/config/nginx/django.conf:/etc/nginx/conf.d/django.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${UL_APP_PORT:-21800}:8080"
    depends_on:
      - app
      - app-ws
    networks:
      app_network:
        aliases:
          - urbanlens_nginx

    healthcheck:
      # 127.0.0.1, not localhost: inside the alpine image localhost resolves
      # to ::1 first and nginx's `listen 8080` binds IPv4 only, so the check
      # was connection-refused on every probe (container permanently
      # "unhealthy" despite serving traffic fine).
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_db
    # Pin to the same major version as postgresql-client-17 in the Dockerfile so
    # the pg_dump binary and server protocol stay in sync.
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      app_network:
        aliases:
          - urbanlens_db

    environment:
      - POSTGRES_USER=${UL_DB_USER:-postgres}
      - POSTGRES_DB=${UL_DB_NAME:-postgres}
      - POSTGRES_PASSWORD=${UL_DB_PASS:-postgres}
      - POSTGRES_PORT=${UL_DB_PORT:-5432}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UL_DB_USER:-postgres}"]
      interval: 10s
      timeout: 10s
      retries: 9

    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  celery-worker:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_celery_worker
    build:
      <<: *app-build
    entrypoint: ["/docker-entrypoint.sh", "python", "-m", "celery"]
    # Handles every task EXCEPT external-data panel fetches, which now run on
    # celery-worker-panels below (see that service's comment for why they're
    # split out). Concurrency=4 (prefork - one OS process per slot) is plenty
    # for this queue's remaining traffic: photo/backup/export jobs and the
    # scheduled housekeeping tasks (safety check-ins, account deletion, etc),
    # none of which arrive in the same "~10 at once" bursts panel fetches did.
    # loglevel=warning: info logs a "received"/"succeeded" line for every task,
    # including the safety-checkin scheduled tasks that fire every 5 minutes -
    # that drowns out real signal in production. Failures/retries are still
    # surfaced explicitly via the task_failure/task_retry handlers in celery.py.
    command: ["-A", "urbanlens.UrbanLens", "worker", "--loglevel=warning", "--concurrency=4"]
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - logs:/var/log/urbanlens
      - media_volume:/app/src/urbanlens/media
      - backups:/app/src/backups
    networks:
      - app_network
    environment:
      <<: *app-env
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  celery-worker-panels:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_celery_worker_panels
    build:
      <<: *app-build
    entrypoint: ["/docker-entrypoint.sh", "python", "-m", "celery"]
    # Dedicated queue + worker for external-data panel fetches
    # (services/external_data.py's fetch_panel_source task, dispatched to the
    # "panel_fetch" queue via PanelSource.queue). Split out from celery-worker
    # above because a cold pin detail page enqueues ~10 of these small,
    # mostly-IO-bound tasks at once, all sharing celery-worker's 4 process
    # slots - one slow/degraded external API could occupy a slot long enough
    # that unrelated panels queued behind it were still "Loading..." when the
    # client's poll budget ran out (see the pin-page bug report this fixed).
    #
    # --pool=threads (real OS threads, no extra dependency - built into
    # Celery) instead of prefork: these tasks are >95% spent waiting on HTTP
    # responses, so one thread per task costs kilobytes instead of a whole
    # Python/Django process's worth of memory, letting --concurrency go much
    # higher for the same resource budget. Deliberately NOT gevent/eventlet:
    # this app already got burned once by cooperative-scheduling greenlets
    # (see WEB_CONCURRENCY's comment above) - a CPU-bound unit of work never
    # yields control in a gevent loop, freezing every other greenlet in that
    # process indefinitely, whereas the GIL still preempts between OS threads
    # every few ms regardless. The couple of panels that DO real CPU-bound
    # work (BoundaryPanelSource, OvertureBuildingAttributesPanelSource -
    # GeoParquet/Shapely geometry parsing) opt out via PanelSource.queue and
    # stay on celery-worker's prefork pool instead, so they can't cause GIL
    # contention here for the panels that are genuinely just waiting on I/O.
    command: ["-A", "urbanlens.UrbanLens", "worker", "--loglevel=warning", "--pool=threads", "--concurrency=20", "-Q", "panel_fetch"]
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - logs:/var/log/urbanlens
    networks:
      - app_network
    environment:
      <<: *app-env
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  celery-beat:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_celery_beat
    build:
      <<: *app-build
    entrypoint: ["/docker-entrypoint.sh", "python", "-m", "celery"]
    # loglevel=warning: info logs "Scheduler: Sending due task ..." on every beat tick
    # (every 5 minutes for the safety-checkin tasks alone), which is pure noise once
    # the schedule is known-good.
    command: ["-A", "urbanlens.UrbanLens", "beat", "--loglevel=warning", "--schedule=/var/log/urbanlens/celerybeat-schedule"]
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - logs:/var/log/urbanlens
    networks:
      - app_network
    environment:
      <<: *beat-env
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  # clamd daemon every upload (photos/videos/documents, article images,
  # avatars, custom icons, comment/DM attachments) is scanned through before
  # it's ever written to permanent storage - see services/malware_scan.py.
  # The image's own baked-in HEALTHCHECK (pings clamd on its TCP port) is
  # used as-is rather than reimplemented here - deliberately not overriding
  # it with a guessed script name. The app fails uploads closed (rejects
  # them, see MalwareScanUnavailableError) if this container is unreachable,
  # so keep it running in every environment that accepts uploads.
  clamav:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_clamav
    image: clamav/clamav-debian:stable
    restart: unless-stopped
    environment:
      # StreamMaxLength is unset by default, which falls back to clamd's own
      # compiled-in default - observed to be well under SiteSettings'
      # max_upload_file_size_mb (250MB by default, admin-adjustable up to
      # 20,000MB), so an upload that passes our own size check could still
      # be rejected by clamd with a confusing "too large to scan" error (see
      # docs/prompts/completed.md's "article image upload malware-scan-too-
      # large" entry). Pinned explicitly, comfortably above the default site
      # setting, so clamd is never the surprise bottleneck for a normal-sized
      # upload - see the image's /init entrypoint script, which turns any
      # CLAMD_CONF_<Directive> env var into that clamd.conf directive.
      CLAMD_CONF_StreamMaxLength: "1000M"
      # clamd has no separate log-level control for its own periodic
      # "SelfCheck: Database status OK." heartbeat - it isn't gated by
      # LogVerbose (confirmed: it still logs with LogVerbose at its default
      # of "no"), so the only lever available is how often it runs. Left at
      # its compiled-in default (600s = every 10 minutes) this floods
      # `docker compose logs` with a benign, expected message every few
      # minutes; once a day is still a reasonable cadence for what this
      # check actually verifies (the virus database directory hasn't gone
      # stale/corrupted underneath the running daemon).
      CLAMD_CONF_SelfCheck: "86400"
    volumes:
      - clamav-db:/var/lib/clamav
    networks:
      app_network:
        aliases:
          - urbanlens_clamav
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  valkey:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_valkey
    image: valkey/valkey:7-alpine
    user: nobody
    restart: unless-stopped
    # volatile-lru (not allkeys-lru): this instance is shared by the Django cache,
    # the Channels layer, and the Celery broker/result backend. allkeys-lru can
    # evict *any* key under memory pressure, including un-expiring Celery queue
    # lists and channel-layer group membership - silent data loss. volatile-lru
    # only evicts keys with a TTL (the cache's, and the channel layer's own
    # expiring keys), so queued Celery tasks are never silently dropped; if
    # memory is genuinely exhausted, writes fail loudly (OOM) instead.
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "512mb", "--maxmemory-policy", "volatile-lru"]
    networks:
      app_network:
        aliases:
          - urbanlens_valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  # --- Test topology (opt-in: docker compose --profile test ...) -------------
  # pytest's LocalhostOnlyNetwork guard (core/tests/testing_network.py) only
  # permits loopback connections, which the normal service topology can't
  # satisfy - UL_VALKEY_URL/UL_DB_HOST resolve to container-bridge IPs, so
  # running pytest inside `app` trips the guard on legitimate same-stack
  # traffic (docs/PROBLEMS.md; decision 2026-07-23: dedicated topology, do NOT
  # widen the guard). These three services form a "pod": test-db and
  # test-valkey join test-runner's network namespace (network_mode:
  # service:test-runner), so inside test-runner both really are localhost and
  # the guard stays exactly as strict as written.
  #
  # Usage (fresh throwaway DB every time - no volumes are mounted):
  #   docker compose --profile test up -d --build test-runner test-db test-valkey
  #   docker compose exec -e UL_TEST_DB_NAME=ul_test_$RANDOM test-runner \
  #     python -m pytest src/urbanlens/dashboard/tests/
  #   docker compose --profile test down
  test-runner:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_test_runner
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Always a dev-grade build: the runner needs the `dev` dependency
        # group (pytest, hypothesis, mypy) regardless of the host's
        # UL_ENVIRONMENT (a staging/production value would `uv sync --no-dev`
        # them away - see x-app-build's comment).
        UL_ENVIRONMENT: development
        UL_CONTAINER_NAME: ${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_test
    # Bypass /docker-entrypoint.sh: init.py runs migrate+collectstatic against
    # a DB that pytest hasn't created yet. The runner just stays alive for
    # `docker compose exec ... pytest` calls.
    entrypoint: ["sleep", "infinity"]
    environment:
      <<: *app-env
      UL_DB_HOST: localhost
      UL_DB_PORT: "5432"
      UL_VALKEY_URL: redis://localhost:6379/0
      UL_ENVIRONMENT: development
    networks:
      - app_network

  test-db:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_test_db
    profiles: ["test"]
    image: postgis/postgis:17-3.5
    # Shares test-runner's network namespace so it listens on the runner's
    # localhost:5432. No data volume on purpose: every `up` starts pristine.
    network_mode: service:test-runner
    depends_on:
      - test-runner
    environment:
      - POSTGRES_USER=${UL_DB_USER:-postgres}
      - POSTGRES_DB=${UL_DB_NAME:-postgres}
      - POSTGRES_PASSWORD=${UL_DB_PASS:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UL_DB_USER:-postgres}"]
      interval: 10s
      timeout: 10s
      retries: 9
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  test-valkey:
    container_name: urbanlens_${UL_CONTAINER_NAME:-${UL_ENVIRONMENT:-production}}_test_valkey
    profiles: ["test"]
    image: valkey/valkey:7-alpine
    user: nobody
    network_mode: service:test-runner
    depends_on:
      - test-runner
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "volatile-lru"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

volumes:
  postgres-data:
  logs:
  static_volume:
  media_volume:
  backups:
  clamav-db:

networks:
  app_network:
    driver: bridge
    # Docker defaults new bridge networks to dual-stack, handing containers a ULA
    # IPv6 address alongside IPv4. Gunicorn only binds 0.0.0.0:8000, so nginx's
    # proxy_pass DNS lookup for urbanlens_app can resolve the unreachable AAAA
    # record and log "upstream server temporarily disabled" before falling back
    # to IPv4. Disable IPv6 here so only the working A record is ever returned.
    enable_ipv6: false
