services:
  app:
    container_name: urbanlens_app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=${ENVIRONMENT:-production}
        - UL_DATABASE_USER=${UL_DB_USER:-postgres}
        - UL_DATABASE_NAME=${UL_DB_NAME:-postgres}
        - UL_DATABASE_PASS=${UL_DB_PASS:-postgres}
        - UL_DATABASE_HOST=${UL_DB_HOST:-urbanlens_db}
        - UL_DATABASE_PORT=${UL_DB_PORT:-5432}

    restart: on-failure

    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

    volumes:
      - logs:/var/log
      - static_volume:/app/src/urbanlens/frontend/static
      - media_volume:/app/src/urbanlens/media

    ports:
      - "${URBANLENS_PORT:-21800}:8000"

    networks:
      app_network:
        aliases:
          - urbanlens_app

    environment:
      - UL_DB_USER=${UL_DB_USER:-postgres}
      - UL_DB_NAME=${UL_DB_NAME:-postgres}
      - UL_DB_PASS=${UL_DB_PASS:-postgres}
      - UL_DB_HOST=${UL_DB_HOST:-urbanlens_db}
      - UL_DB_PORT=${UL_DB_PORT:-5432}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - UL_GOOGLE_CLIENT_ID=${UL_GOOGLE_CLIENT_ID}
      - UL_GOOGLE_CLIENT_SECRET=${UL_GOOGLE_CLIENT_SECRET}
      - UL_DISCORD_CLIENT_ID=${UL_DISCORD_CLIENT_ID}
      - UL_DISCORD_CLIENT_SECRET=${UL_DISCORD_CLIENT_SECRET}
      - UL_GOOGLE_PLACES_API_KEY=${UL_GOOGLE_PLACES_API_KEY}
      - UL_GOOGLE_MAPS_API_KEY=${UL_GOOGLE_MAPS_API_KEY}
      - UL_GOOGLE_SEARCH_API_KEY=${UL_GOOGLE_SEARCH_API_KEY}
      - UL_GOOGLE_SEARCH_TENANT=${UL_GOOGLE_SEARCH_TENANT}
      - UL_GOOGLE_SEARCH_CX=${UL_GOOGLE_SEARCH_CX:-${UL_GOOGLE_SEARCH_TENANT}}
      - UL_OPENWEATHERMAP_API_KEY=${UL_OPENWEATHERMAP_API_KEY}
      - UL_NPS_API_KEY=${UL_NPS_API_KEY}
      - UL_OPENAI_API_KEY=${UL_OPENAI_API_KEY}
      - UL_SMITHSONIAN_API_KEY=${UL_SMITHSONIAN_API_KEY}
      - UL_VALKEY_URL=${UL_VALKEY_URL:-redis://urbanlens_valkey:6379/0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    container_name: urbanlens_nginx
    image: nginx:alpine
    volumes:
      - static_volume:/app/src/urbanlens/frontend/static
      - media_volume:/app/src/urbanlens/media
      - ./src/urbanlens/config/nginx:/etc/nginx/conf.d
    ports:
      - "${NGINX_PORT:-21080}:80"
    depends_on:
      - app
    networks:
      app_network:
        aliases:
          - urbanlens_nginx

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    container_name: urbanlens_db
    image: postgis/postgis:latest
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      app_network:
        aliases:
          - urbanlens_db

    environment:
      - POSTGRES_USER=${UL_DB_USER:-postgres}
      - POSTGRES_DB=${UL_DB_NAME:-postgres}
      - POSTGRES_PASSWORD=${UL_DB_PASS:-postgres}
      - POSTGRES_PORT=${UL_DB_PORT:-5432}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UL_DB_USER:-postgres}"]
      interval: 10s
      timeout: 10s
      retries: 9

    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  valkey:
    container_name: urbanlens_valkey
    image: valkey/valkey:7-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory-policy", "allkeys-lru"]
    networks:
      app_network:
        aliases:
          - urbanlens_valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

volumes:
  postgres-data:
  logs:
  static_volume:
  media_volume:

networks:
  app_network:
    driver: bridge
