# Shared build configuration — all three app containers use the same image.
x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    - ENVIRONMENT=${ENVIRONMENT:-production}

# Full environment for the app server and celery workers (need all API keys).
# UL_PG_DUMP_BIN bypasses the pg_wrapper dispatcher and calls the versioned
# binary directly, which avoids the "install postgresql-client-<ver>" error
# when the wrapper can't find a local cluster matching the remote server.
x-app-env: &app-env
  UL_DB_USER: ${UL_DB_USER:-postgres}
  UL_DB_NAME: ${UL_DB_NAME:-postgres}
  UL_DB_PASS: ${UL_DB_PASS:-postgres}
  UL_DB_HOST: ${UL_DB_HOST:-urbanlens_db}
  UL_DB_PORT: ${UL_DB_PORT:-5432}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  UL_GOOGLE_CLIENT_ID: ${UL_GOOGLE_CLIENT_ID}
  UL_GOOGLE_CLIENT_SECRET: ${UL_GOOGLE_CLIENT_SECRET}
  UL_DISCORD_CLIENT_ID: ${UL_DISCORD_CLIENT_ID}
  UL_DISCORD_CLIENT_SECRET: ${UL_DISCORD_CLIENT_SECRET}
  UL_GOOGLE_PLACES_API_KEY: ${UL_GOOGLE_PLACES_API_KEY}
  UL_GOOGLE_MAPS_API_KEY: ${UL_GOOGLE_MAPS_API_KEY}
  UL_GOOGLE_SEARCH_API_KEY: ${UL_GOOGLE_SEARCH_API_KEY}
  UL_GOOGLE_SEARCH_TENANT: ${UL_GOOGLE_SEARCH_TENANT}
  UL_GOOGLE_SEARCH_CX: ${UL_GOOGLE_SEARCH_CX:-${UL_GOOGLE_SEARCH_TENANT}}
  UL_OPENWEATHERMAP_API_KEY: ${UL_OPENWEATHERMAP_API_KEY}
  UL_NPS_API_KEY: ${UL_NPS_API_KEY}
  UL_OPENAI_API_KEY: ${UL_OPENAI_API_KEY}
  UL_SMITHSONIAN_API_KEY: ${UL_SMITHSONIAN_API_KEY}
  UL_VALKEY_URL: ${UL_VALKEY_URL:-redis://urbanlens_valkey:6379/0}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  UL_PG_DUMP_BIN: /usr/lib/postgresql/17/bin/pg_dump

# Minimal environment for celery-beat — only needs DB + broker to schedule tasks.
x-beat-env: &beat-env
  UL_DB_USER: ${UL_DB_USER:-postgres}
  UL_DB_NAME: ${UL_DB_NAME:-postgres}
  UL_DB_PASS: ${UL_DB_PASS:-postgres}
  UL_DB_HOST: ${UL_DB_HOST:-urbanlens_db}
  UL_DB_PORT: ${UL_DB_PORT:-5432}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  UL_VALKEY_URL: ${UL_VALKEY_URL:-redis://urbanlens_valkey:6379/0}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}

services:
  app:
    container_name: urbanlens_app
    build:
      <<: *app-build

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

    volumes:
      - logs:/var/log
      - static_volume:/app/src/urbanlens/frontend/static
      - media_volume:/app/src/urbanlens/media
      - backups:/app/src/backups

    ports:
      - "${URBANLENS_PORT:-21800}:8000"

    networks:
      app_network:
        aliases:
          - urbanlens_app

    environment:
      <<: *app-env

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    container_name: urbanlens_nginx
    image: nginxinc/nginx-unprivileged:alpine
    volumes:
      - static_volume:/app/src/urbanlens/frontend/static
      - media_volume:/app/src/urbanlens/media
      - ./src/urbanlens/config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/urbanlens/config/nginx/django.conf:/etc/nginx/conf.d/django.conf:ro
    ports:
      - "${NGINX_PORT:-21080}:8080"
    depends_on:
      - app
    networks:
      app_network:
        aliases:
          - urbanlens_nginx

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    container_name: urbanlens_db
    # Pin to the same major version as postgresql-client-17 in the Dockerfile so
    # the pg_dump binary and server protocol stay in sync.
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      app_network:
        aliases:
          - urbanlens_db

    environment:
      - POSTGRES_USER=${UL_DB_USER:-postgres}
      - POSTGRES_DB=${UL_DB_NAME:-postgres}
      - POSTGRES_PASSWORD=${UL_DB_PASS:-postgres}
      - POSTGRES_PORT=${UL_DB_PORT:-5432}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UL_DB_USER:-postgres}"]
      interval: 10s
      timeout: 10s
      retries: 9

    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  celery-worker:
    container_name: urbanlens_celery_worker
    build:
      <<: *app-build
    entrypoint: ["/docker-entrypoint.sh", "python", "-m", "celery"]
    command: ["-A", "urbanlens.UrbanLens", "worker", "--loglevel=info", "--concurrency=2"]
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - logs:/var/log
      - media_volume:/app/src/urbanlens/media
      - backups:/app/src/backups
    networks:
      - app_network
    environment:
      <<: *app-env
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  celery-beat:
    container_name: urbanlens_celery_beat
    build:
      <<: *app-build
    entrypoint: ["/docker-entrypoint.sh", "python", "-m", "celery"]
    command: ["-A", "urbanlens.UrbanLens", "beat", "--loglevel=info", "--schedule=/var/log/urbanlens/celerybeat-schedule"]
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - logs:/var/log
    networks:
      - app_network
    environment:
      <<: *beat-env
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  valkey:
    container_name: urbanlens_valkey
    image: valkey/valkey:7-alpine
    user: nobody
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      app_network:
        aliases:
          - urbanlens_valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

volumes:
  postgres-data:
  logs:
  static_volume:
  media_volume:
  backups:

networks:
  app_network:
    driver: bridge
