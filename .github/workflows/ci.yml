name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: urbanlens.UrbanLens.settings.test
  DJANGO_SECRET_KEY: ci-insecure-secret-key
  UL_DB_NAME: urbanlens_ci
  UL_DB_USER: postgres
  UL_DB_PASS: postgres
  UL_DB_HOST: localhost
  UL_DB_PORT: "5432"
  UL_VALKEY_URL: redis://localhost:6379/0
  UL_UNSAFE_ALLOW_HTTP: "True"
  UL_ENVIRONMENT: testing

jobs:
  python-quality:
    name: Python quality and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: urbanlens_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d urbanlens_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev postgresql-client

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements/*.txt
            pyproject.toml
            uv.lock

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt
          python -m pip install -e .

      - name: Ruff lint
        run: ruff check src

      - name: Ruff format check
        run: ruff format --check src

      - name: Static type check
        run: mypy src

      - name: Django deployment checks
        run: python src/urbanlens/manage.py check --deploy --fail-level WARNING

      - name: Django tests with coverage
        run: |
          coverage run --source=src src/urbanlens/manage.py test
          coverage xml
          coverage report --fail-under=1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: npm install

      - name: Build JavaScript bundle
        run: bun run build

      - name: Build stylesheet
        run: bun run sass

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [python-quality, frontend]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: urbanlens/urbanlens:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            UL_DATABASE_USER=postgres
            UL_DATABASE_NAME=urbanlens_ci
            UL_DATABASE_PASS=postgres
            UL_DATABASE_HOST=urbanlens_db
            UL_DATABASE_PORT=5432
