name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: urbanlens.UrbanLens.settings.test
  DJANGO_SECRET_KEY: ci-insecure-secret-key
  UL_DB_NAME: urbanlens_ci
  UL_DB_USER: postgres
  UL_DB_PASS: postgres
  UL_DB_HOST: localhost
  UL_DB_PORT: "5432"
  UL_VALKEY_URL: redis://localhost:6379/0
  UL_UNSAFE_ALLOW_HTTP: "True"
  UL_ENVIRONMENT: testing

jobs:
  python-quality:
    name: Python quality and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: urbanlens_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d urbanlens_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev postgresql-client

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          uv sync --frozen
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Ruff lint
        run: ruff check src

      - name: Ruff format check
        run: ruff format --check src

      - name: Static type check
        run: mypy src

      # ----------------------------------------------------------------------------
      # Three issues to address here (TODO):
      # 1 -- ?: (security.W004) You have not set a value for the SECURE_HSTS_SECONDS setting. If your entire site is served only over SSL, you may want to consider setting a value and enabling HTTP Strict Transport Security. Be sure to read the documentation first; enabling HSTS carelessly can cause serious, irreversible problems.
      # 2 -- ?: (security.W009) Your SECRET_KEY has less than 50 characters, less than 5 unique characters, or it's prefixed with 'django-insecure-' indicating that it was generated automatically by Django. Please generate a long and random value, otherwise many of Django's security-critical features will be vulnerable to attack.
      # 3 -- Copy .env-sample to .env so CI picks up the env vars.
      # ----------------------------------------------------------------------------
      #- name: Django deployment checks
      #  run: python src/urbanlens/manage.py check --deploy --fail-level WARNING

      - name: Django tests with coverage
        run: |
          coverage run --source=src src/urbanlens/manage.py test
          coverage xml
          coverage report --fail-under=1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: npm install

      - name: Build JavaScript bundle
        run: bun run build

      - name: Build stylesheet
        run: bun run sass

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [python-quality, frontend]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build application image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: urbanlens/urbanlens:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            UL_DATABASE_USER=postgres
            UL_DATABASE_NAME=urbanlens_ci
            UL_DATABASE_PASS=postgres
            UL_DATABASE_HOST=urbanlens_db
            UL_DATABASE_PORT=5432
