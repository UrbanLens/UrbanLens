name: Publish Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, tag, or SHA to publish
        required: false
        default: main

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.ref || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.12"

jobs:
  build-python-package:
    name: Build Python distribution
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

      - name: Attach distributions to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  publish-container:
    name: Publish container image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=ref,event=branch,enable=${{ github.event_name != 'release' }}
            type=sha,prefix=sha-

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            UL_DATABASE_USER=postgres
            UL_DATABASE_NAME=postgres
            UL_DATABASE_PASS=postgres
            UL_DATABASE_HOST=urbanlens_db
            UL_DATABASE_PORT=5432

      - name: Generate image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
